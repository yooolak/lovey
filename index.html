<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>for you, Lovey</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="petals" id="petals"></div>

  <audio id="bgMusic" loop>
    <source src="audios/two-is-better-than-one.mp3" type="audio/mpeg">
  </audio>

  <!-- Entrance Overlay -->
  <div class="overlay" id="overlay">
    <div class="overlay-inner">
      <p class="from-label">from Karl</p>
      <h1 class="overlay-title">i owe you this.</h1>
      <p class="overlay-sub">will you hear me out?</p>
      <div class="btn-group">
        <button class="btn-yes" onclick="openLetter()">oo naman</button>
        <button class="btn-no" id="noBtn" onclick="runAway()">naur!</button>
      </div>
      <p class="shrink-caption" id="shrinkCaption"></p>
    </div>
  </div>

  <!-- Main Page -->
  <main class="main-page" id="mainPage">

    <header class="page-header">
      <p class="header-eyebrow">for you</p>
      <h2 class="header-title">Lovey</h2>
    </header>

    <section class="letter-section">
      <div class="letter-card">
        <p id="typewriter-text"></p>
        <span class="cursor" id="cursor">|</span>
      </div>
    </section>

    <section class="photos-section">
      <p class="section-label">🤍</p>
      <div class="photos">
        <div class="photo-slot"><img src="photos/photo1.jpg" alt="us" /></div>
        <div class="photo-slot"><img src="photos/photo2.jpg" alt="us" /></div>
        <div class="photo-slot"><img src="photos/photo3.jpg" alt="us" /></div>
        <div class="photo-slot"><img src="photos/photo4.jpg" alt="us" /></div>
        <div class="photo-slot"><img src="photos/photo5.jpg" alt="us" /></div>
        <div class="photo-slot"><img src="photos/photo6.jpg" alt="us" /></div>
        <div class="photo-slot"><img src="photos/photo7.jpg" alt="us" /></div>
        <div class="photo-slot"><img src="photos/photo8.jpg" alt="us" /></div>
        <div class="photo-slot"><img src="photos/photo9.jpg" alt="us" /></div>
        <div class="photo-slot"><img src="photos/photo10.jpg" alt="us" /></div>
        <div class="photo-slot"><img src="photos/photo11.jpg" alt="us" /></div>
        <div class="photo-slot"><img src="photos/photo12.jpg" alt="us" /></div>
      </div>
    </section>

    <div class="now-playing" id="nowPlaying">
      <button class="play-pause-btn" id="playPauseBtn" onclick="toggleMusic()">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="white" id="playIcon" style="display:none"><polygon points="2,1 11,6 2,11"/></svg>
        <svg width="12" height="12" viewBox="0 0 12 12" fill="white" id="pauseIcon"><rect x="2" y="1" width="3" height="10"/><rect x="7" y="1" width="3" height="10"/></svg>
      </button>
      <div class="track-info">
        <span class="track-title">Two Is Better Than One</span>
        <span class="track-artist">Boys Like Girls ft. Taylor Swift</span>
      </div>
    </div>

    <footer class="page-footer">
      <p>— Kaloys</p>
    </footer>

  </main>

  <script src="script.js"></script>
</body>
</html>
